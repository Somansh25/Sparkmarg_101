<div class="auth-container fade-in">
    <div class="auth-card glass-panel">
        <div class="text-center mb-6">
            <h2 class="auth-title">Join SPARKMARG</h2>
            <p class="auth-subtitle text-muted">Start your immersive professional journey today</p>
        </div>

        <form id="register-form" onsubmit="return false;">
            <div id="register-alert" class="error-msg-block hidden"></div>
            
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" class="form-control" placeholder="Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" class="form-control" placeholder="jane@example.com" required>
            </div>

            <div class="form-group">
                <label for="reg-password">Security Password</label>
                <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" id="register-submit-btn" class="btn btn-primary btn-block mt-4 hover-lift">
                Initialize Profile
            </button>
        </form>

        <div class="auth-footer-link">
            <p class="text-muted">Already have an account? 
                <a href="javascript:void(0)" onclick="window.SparkMarg.navigateTo('login')" class="text-primary fw-semibold">Sign In</a>
            </p>
        </div>
    </div>
</div>
