<div class="auth-container fade-in">
    <div class="auth-card glass-panel">
        <div class="text-center mb-6">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle text-muted">Sign in to resume your career simulations</p>
        </div>

        <form id="login-form" onsubmit="return false;">
            <div id="login-alert" class="error-msg-block hidden"></div>
            
            <div class="form-group">
                <label for="login-email">Corporate Email</label>
                <input type="email" id="login-email" class="form-control" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" id="login-submit-btn" class="btn btn-primary btn-block mt-4 hover-lift">
                Access Workspace
            </button>
        </form>

        <div class="auth-footer-link">
            <p class="text-muted">New to the platform? 
                <a href="javascript:void(0)" onclick="window.SparkMarg.navigateTo('register')" class="text-primary fw-semibold">Create Account</a>
            </p>
        </div>
    </div>
</div>
